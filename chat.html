<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narima AI</title>

<link rel="icon" href="favicon.png">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-H0ZPTBQQYM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-H0ZPTBQQYM');
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="chat-container">

    <div class="chat-header">

        <h1>🚀 Narima AI</h1>

        <p class="tagline">
            From Ideas to Action
        </p>

        <p class="company">
            A Product of BMT
        </p>

    </div>

    <div class="dashboard-links">

        <a href="dashboard.html" class="hero-btn">
            📊 Open Dashboard
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdW-RKnqmMShBco9hgRtopnmVhUi21rzcP43V3wk7STzwuaYQ/viewform"
           target="_blank"
           class="hero-btn">
            📝 Give Feedback
        </a>

    </div>

    <div id="chat-box">

        <div class="ai-message">

            👋 Welcome to Narima AI.

            <br><br>

            I help people improve:

            <br>🎯 Goals
            <br>💼 Careers
            <br>🚀 Businesses
            <br>❤️ Relationships
            <br>🧠 Mindset
            <br>📈 Productivity
            <br>⚙️ Solutions

            <br><br>

            Ask me anything.

        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="user-input"
        placeholder="Ask Narima anything...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

async function sendMessage(){

const input =
document.getElementById("user-input");

const chatBox =
document.getElementById("chat-box");

if(!input || !chatBox){
return;
}

const message =
input.value.trim();

if(message === ""){
return;
}

chatBox.innerHTML += `
<div class="user-message">
${message}
</div>
`;

input.value = "";

chatBox.innerHTML += `
<div class="ai-message" id="thinking">
🎯 Building your action plan...
</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

try{

const response =
await fetch("/api/chat", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
message: message
})

});

const data =
await response.json();

const thinking =
document.getElementById("thinking");

if(thinking){
thinking.remove();
}

chatBox.innerHTML += `
<div class="ai-message">
${data.reply || "I couldn't generate a response."}
</div>
`;

chatBox.scrollTop =
chatBox.scrollHeight;

}
catch(error){

const thinking =
document.getElementById("thinking");

if(thinking){
thinking.remove();
}

chatBox.innerHTML += `
<div class="ai-message">
⚠️ Unable to connect to Narima AI.
Please try again.
</div>
`;

console.error(error);

}

}

const userInput =
document.getElementById("user-input");

if(userInput){

userInput.addEventListener(
"keypress",
function(e){

if(e.key === "Enter"){

e.preventDefault();

sendMessage();

}

});

}

</script>

</body>
</html>
